<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — Marsh Consultoria</title>
  <link rel="stylesheet" href="styles.css" />
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0066cc" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-title" content="Marsh" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <style>
    body {
      min-height: 100vh;
      background: var(--navy);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .login-card {
      background: var(--navy-mid);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: var(--radius);
      padding: 2.5rem;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .login-logo {
      text-align: center;
      margin-bottom: 2rem;
    }

    .login-logo h1 {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--white);
    }

    .login-logo span { color: var(--cyan); }

    .login-logo p {
      color: var(--grey-400);
      font-size: 0.875rem;
      margin-top: 0.25rem;
    }

    .form-group { margin-bottom: 1.25rem; }

    .form-group label {
      display: block;
      color: var(--grey-400);
      font-size: 0.8rem;
      margin-bottom: 0.4rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .form-group input {
      width: 100%;
      padding: 0.75rem 1rem;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px;
      color: var(--white);
      font-size: 0.95rem;
      transition: var(--transition);
      outline: none;
    }

    .form-group input:focus {
      border-color: var(--cyan);
      background: rgba(0,200,255,0.05);
    }

    .btn-login {
      width: 100%;
      padding: 0.85rem;
      background: var(--blue);
      color: var(--white);
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: var(--transition);
      margin-top: 0.5rem;
    }

    .btn-login:hover { background: var(--blue-light); }
    .btn-login:disabled { opacity: 0.6; cursor: not-allowed; }

    .mensagem {
      margin-top: 1rem;
      padding: 0.75rem 1rem;
      border-radius: 8px;
      font-size: 0.875rem;
      text-align: center;
      display: none;
    }

    .mensagem.erro {
      background: rgba(239,68,68,0.15);
      color: #fca5a5;
      border: 1px solid rgba(239,68,68,0.3);
      display: block;
    }

    .mensagem.sucesso {
      background: rgba(16,185,129,0.15);
      color: #6ee7b7;
      border: 1px solid rgba(16,185,129,0.3);
      display: block;
    }

    .login-footer {
      text-align: center;
      margin-top: 1.5rem;
      font-size: 0.78rem;
      color: rgba(255,255,255,0.2);
    }
  </style>
</head>
<body>
  <div class="login-card">
    <div class="login-logo">
      <a href="/index.html" style="text-decoration:none;color:inherit"><h1>Marsh <span>Consultoria</span></h1></a>
      <p>Sistema de Gestão</p>
    </div>

    <div class="form-group">
      <label>Email</label>
      <input type="email" id="login-email" placeholder="seu@email.com" autocomplete="email" />
    </div>
    <div class="form-group">
      <label>Senha</label>
      <input type="password" id="login-senha" placeholder="••••••••" autocomplete="current-password" />
    </div>
    <button class="btn-login" id="btn-entrar" onclick="fazerLogin()">Entrar</button>
    <div class="mensagem" id="login-msg"></div>

    <div class="login-footer">Acesso restrito — contate o administrador para obter credenciais</div>
  </div>

  <script>
    // Redireciona se já autenticado
    const tokenExistente = localStorage.getItem('token');
    const usuarioExistente = JSON.parse(localStorage.getItem('usuario') || 'null');
    if (tokenExistente && usuarioExistente) {
      if (usuarioExistente.tipo === 'cliente') {
        window.location.href = '/portal.html';
      } else {
        window.location.href = '/dashboard.html';
      }
    }

    function mostrarMensagem(texto, tipo) {
      const el = document.getElementById('login-msg');
      el.textContent = texto;
      el.className = `mensagem ${tipo}`;
    }

    async function fazerLogin() {
      const email = document.getElementById('login-email').value.trim();
      const senha = document.getElementById('login-senha').value;
      const btn = document.getElementById('btn-entrar');

      if (!email || !senha) {
        return mostrarMensagem('Preencha email e senha.', 'erro');
      }

      btn.disabled = true;
      btn.textContent = 'Entrando...';

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ email, senha })
        });

        const data = await res.json();

        if (!res.ok) {
          btn.disabled = false;
          btn.textContent = 'Entrar';
          return mostrarMensagem(data.erro, 'erro');
        }

        localStorage.setItem('token', data.token);
        localStorage.setItem('usuario', JSON.stringify(data.usuario));

        // Redireciona baseado no tipo de usuário
        if (data.usuario.tipo === 'cliente') {
          window.location.href = '/portal.html';
        } else {
          window.location.href = '/dashboard.html';
        }
      } catch {
        btn.disabled = false;
        btn.textContent = 'Entrar';
        mostrarMensagem('Erro de conexão. Tente novamente.', 'erro');
      }
    }

    document.addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerLogin();
    });
  </script>
  <script>
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }
  </script>
</body>
</html>
